name: Triage y Deploy

on:
  schedule:
    - cron: '0 8,12,16 * * 1-5'  # 8h, 12h y 16h lunes-viernes (UTC)
  push:
    branches: [main]
  workflow_dispatch:

jobs:

  # ── 1. Analiza bugs de Jira con IA y guarda resultados ──────────────────────
  triage:
    name: Triaje de tickets
    runs-on: ubuntu-latest
    permissions:
      contents: write
      models: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests openai python-dotenv

      - name: Ejecutar agente de triaje
        run: python main.py
        env:
          JIRA_URL: ${{ secrets.JIRA_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Guardar triage.json en main
        run: |
          git config user.email "triage-agent@noreply"
          git config user.name "Triage Agent"
          git add data/triage.json
          git diff --staged --quiet || git commit -m "chore: actualiza triage $(date +%Y-%m-%d-%H%M)"
          git push

  # ── 2. Publica la web con el PAT inyectado (nunca en el repo) ───────────────
  deploy:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: triage
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Preparar archivos con PAT inyectado
        run: |
          mkdir -p _deploy/data
          cp index.html _deploy/index.html
          cp data/triage.json _deploy/data/triage.json
          sed -i 's|TU_PAT_AQUI|${{ secrets.PAGES_PAT }}|g' _deploy/index.html

      - name: Publicar en gh-pages
        run: |
          cd _deploy
          git init
          git config user.email "triage-agent@noreply"
          git config user.name "Triage Agent"
          git add .
          git commit -m "deploy: pages $(date +%Y-%m-%d-%H%M)"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:gh-pages
