name: Deploy GitHub Pages

on:
  workflow_run:
    workflows: ["Triage agent"]
    types: [completed]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Preparar carpeta de deploy
        run: |
          mkdir -p _deploy/data
          cp index.html _deploy/index.html
          cp data/triage.json _deploy/data/triage.json
          sed -i 's|TU_PAT_AQUI|${{ secrets.PAGES_PAT }}|g' _deploy/index.html

      - name: Publicar en gh-pages
        run: |
          cd _deploy
          git init
          git config user.email "triage-agent@noreply"
          git config user.name "Triage Agent"
          git add .
          git commit -m "deploy: pages $(date +%Y-%m-%d-%H%M)"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:gh-pages
