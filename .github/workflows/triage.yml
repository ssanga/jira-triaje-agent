name: Triage agent

on:
  schedule:
    - cron: '0 8,12,16 * * 1-5'  # 8h, 12h y 16h lunes-viernes (UTC)
  workflow_dispatch:

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests openai python-dotenv

      - run: python main.py
        env:
          JIRA_URL: ${{ secrets.JIRA_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: |
          git config user.email "triage-agent@noreply"
          git config user.name "Triage Agent"
          git add data/triage.json
          git diff --staged --quiet || git commit -m "chore: actualiza triage $(date +%Y-%m-%d-%H%M)"
          git push
