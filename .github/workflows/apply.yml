name: Apply triage decisions

on:
  repository_dispatch:
    types: [triage-decision]

jobs:
  apply:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests python-dotenv

      - run: python src/apply.py
        env:
          DECISIONS: ${{ toJson(github.event.client_payload.decisions) }}
          JIRA_URL: ${{ secrets.JIRA_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}

      - run: |
          git config user.email "triage-agent@noreply"
          git config user.name "Triage Agent"
          git add data/triage.json
          git diff --staged --quiet || git commit -m "chore: aplica decisiones de triaje $(date +%Y-%m-%d-%H%M)"
          git push
