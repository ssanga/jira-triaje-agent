name: Aplicar decisiones de triaje

on:
  repository_dispatch:
    types: [triage-decision]

jobs:

  # ── Aplica en Jira las decisiones aprobadas por el usuario ──────────────────
  apply:
    name: Aplicar en Jira y redesplegar
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests python-dotenv

      - name: Aplicar decisiones en Jira
        run: python src/apply.py
        env:
          DECISIONS: ${{ toJson(github.event.client_payload.decisions) }}
          JIRA_URL: ${{ secrets.JIRA_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}

      - name: Guardar triage.json actualizado
        run: |
          git config user.email "triage-agent@noreply"
          git config user.name "Triage Agent"
          git add data/triage.json
          git diff --staged --quiet || git commit -m "chore: aplica decisiones de triaje $(date +%Y-%m-%d-%H%M)"
          git push

  # ── Redesplega Pages con el triage.json ya sin los tickets procesados ────────
  deploy:
    name: Redesplegar GitHub Pages
    runs-on: ubuntu-latest
    needs: apply
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Preparar archivos con PAT inyectado
        run: |
          mkdir -p _deploy/data
          cp index.html _deploy/index.html
          cp data/triage.json _deploy/data/triage.json
          sed -i 's|TU_PAT_AQUI|${{ secrets.PAGES_PAT }}|g' _deploy/index.html

      - name: Publicar en gh-pages
        run: |
          cd _deploy
          git init
          git config user.email "triage-agent@noreply"
          git config user.name "Triage Agent"
          git add .
          git commit -m "deploy: pages tras decisiones $(date +%Y-%m-%d-%H%M)"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:gh-pages
