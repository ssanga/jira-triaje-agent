name: Aplicar decisiones de triaje

on:
  push:
    branches: [main]
    paths:
      - 'decisions.json'   # solo se activa cuando la web escribe este fichero

jobs:

  # ── 1. Aplica en Jira las decisiones aprobadas ──────────────────────────────
  apply:
    name: Aplicar en Jira
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests python-dotenv

      - name: Leer decisiones y aplicar en Jira
        run: |
          DECISIONS=$(cat decisions.json)
          export DECISIONS
          python src/apply.py
        env:
          JIRA_URL: ${{ secrets.JIRA_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}

      - name: Borrar decisions.json y actualizar triage.json
        run: |
          git config user.email "triage-agent@noreply"
          git config user.name "Triage Agent"
          git rm decisions.json
          git add data/triage.json
          git commit -m "chore: aplica decisiones de triaje $(date +%Y-%m-%d-%H%M)"
          git push
